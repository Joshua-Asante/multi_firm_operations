name: Pylint

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install package + pylint
      run: |
        python -m pip install --upgrade pip
        pip install -e .[cli,mc,analysis,report,broker]
        pip install pylint
    - name: Lint
      # --fail-under=8.0 calibrated against current codebase score (8.35/10
      # locally with deps installed). Bar moves up when the score does;
      # for now this catches regressions below the established baseline
      # without blocking on the existing style debt that pre-dates pyproject.
      run: pylint --fail-under=8.0 $(git ls-files '*.py')
