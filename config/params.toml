# config/params.toml — derived parameter manifest
#
# DERIVED MIRROR — NOT canonical. Pine source is canonical for strategy
# behavior per Rule 0. `dd_protection.py` / `firm_rules.py` are canonical
# for live-sizing constants. This file mirrors what those sources declare
# so that drift between production and documentation can be flagged
# mechanically.
#
# Editing this file does NOT change strategy behavior. To change a parameter:
#   1. Edit Pine source.
#   2. Update `dd_protection.py` and/or `firm_rules.py` if it is a
#      sizing / risk-control constant.
#   3. Re-run `python portfolio_mc.py --panel pepperstone` (and update
#      `tests/test_mc_anchors.py` if anchor numbers shift).
#   4. Update this manifest.
#   5. Update `CLAUDE.md` Strategy Reference table.
# All five in the same commit. Validator at `scripts/validate_params.py`
# enforces 1-4 mechanically. (5) lives in code-review.
#
# File format note: TOML (not YAML) — `tomllib` is Python 3.11 stdlib;
# pyyaml is not a declared dependency in `pyproject.toml`.
#
# Last sync: 2026-05-18

